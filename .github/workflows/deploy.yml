name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        working-directory: nextjs
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        working-directory: nextjs
        run: npx tsc --noEmit

      - name: Build
        working-directory: nextjs
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 300s
          script: |
            set -e
            cd /root/aadesh-ai-src/nextjs

            echo "Pull latest code"
            git pull origin main

            echo "Install dependencies"
            npm install --legacy-peer-deps --prefer-offline

            echo "Clean stale build cache"
            rm -rf .next

            echo "Build"
            npm run build

            echo "Copy standalone runtime (REQUIRED - missing before Apr 18 outage)"
            cp -r .next/standalone/. /root/aadesh-ai/

            echo "Sync static assets with --delete (prevents stale chunk hash merging)"
            rsync -a --delete .next/static/ /root/aadesh-ai/.next/static/

            echo "Copy public assets"
            cp -r public/. /root/aadesh-ai/public/

            echo "Restart PM2"
            source .env.local && pm2 restart aadesh-ai --update-env

            echo "Health check"
            sleep 4
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aadesh-ai.in/api/health)
            if [ "$STATUS" != "200" ]; then
              echo "Health check FAILED status $STATUS"
              pm2 logs aadesh-ai --lines 30 --nostream
              exit 1
            fi
            echo "Deploy complete health $STATUS"
